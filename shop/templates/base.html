<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Portfolio Shop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <style>
        /* 保守性: Pico.cssの変数を活用したメッセージ装飾 [cite: 2026-02-21] */
        #messages article {
            margin-bottom: 1.5rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
        }

        /* Djangoのmessage.tags (error, success, warning) に対応 [cite: 2026-02-21] */
        .error {
            border-left: 6px solid #d81b60;
            background-color: #fce4ec;
            color: #880e4f;
        }

        .success {
            border-left: 6px solid #43a047;
            background-color: #e8f5e9;
            color: #1b5e20;
        }

        .warning {
            border-left: 6px solid #fbc02d;
            background-color: #fff9c4;
            color: #f57f17;
        }
    </style>
</head>

<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    <nav class="container">
        <ul>
            <li><strong><a href="{% url 'shop:product_list' %}" class="contrast">Gemini Shop</a></strong></li>
        </ul>
        <ul>
            <li><a href="{% url 'shop:order_history' %}" class="secondary">注文履歴</a></li>
            <li>
                <a href="{% url 'shop:checkout' %}" class="secondary" id="cart-link">
                    🛒 カート <span id="cart-count" class="badge">{{ cart_count|default:0 }}</span>
                </a>
            </li>
            <li>
                <a href="{% url 'shop:empty_cart' %}" class="outline secondary"
                    style="font-size: 0.8rem; border-color: transparent;">カートを空にする</a>
            </li>
        </ul>
    </nav>

    <main class="container">
        {% if messages %}
        <div id="messages" hx-history-elt>
            {% for message in messages %}
            <article class="{{ message.tags }}">
                {{ message }}
            </article>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>

</body>

</html>

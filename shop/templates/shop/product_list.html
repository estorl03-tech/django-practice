{% extends "base.html" %}

{% block content %}
<h2>商品一覧</h2>
<div class="grid">
    {% for product in products %}
    <article>
        <header><strong>{{ product.name }}</strong></header>
        {{ product.description|linebreaks }}
        <footer>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span>¥{{ product.price|floatformat:0 }}</span>
                <button hx-post="{% url 'shop:add_to_cart' product.id %}" hx-target="#cart-link" hx-swap="innerHTML"
                    class="outline" style="margin-bottom: 0;">
                    カートに追加
                </button>
            </div>
        </footer>
    </article>
    {% empty %}
    <p>商品がありません。管理画面から登録してください。</p>
    {% endfor %}
</div>
{% endblock %}

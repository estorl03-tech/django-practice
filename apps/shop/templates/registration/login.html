<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>ログイン - My Shop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
</head>

<body class="container">
    <main>
        <article>
            <header>
                <h2>ログイン</h2>
            </header>
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit">ログイン</button>
            </form>
            <footer>
                <p>アカウントをお持ちでない場合は <a href="#">新規登録</a></p>
            </footer>
        </article>
    </main>
</body>

</html>

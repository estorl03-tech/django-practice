<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Portfolio Shop</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <script src="https://unpkg.com/htmx.org@2.0.0"></script>
    <style>
        /* 保守性: Pico.cssの変数を活用したメッセージ装飾 [cite: 2026-02-21] */
        #messages article {
            margin-bottom: 1.5rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
        }

        .error {
            border-left: 6px solid #d81b60;
            background-color: #fce4ec;
            color: #880e4f;
        }

        .success {
            border-left: 6px solid #43a047;
            background-color: #e8f5e9;
            color: #1b5e20;
        }

        .warning {
            border-left: 6px solid #fbc02d;
            background-color: #fff9c4;
            color: #f57f17;
        }

        /* ユーザー名表示の微調整 */
        .user-greeting {
            font-size: 0.9rem;
            margin-right: 10px;
        }
    </style>
</head>

<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
    <nav class="container">
        <ul>
            <li><strong><a href="{% url 'shop:product_list' %}" class="contrast">Gemini Shop</a></strong></li>
        </ul>
        <ul>
            {% if user.is_authenticated %}
            <li><span class="user-greeting">👤 <strong>{{ user.username }}</strong> 様</span></li>
            <li><a href="{% url 'shop:order_history' %}" class="secondary">注文履歴</a></li>
            <li>
                <form action="{% url 'logout' %}" method="post" style="display:inline; margin:0;">
                    {% csrf_token %}
                    <button type="submit" class="outline secondary"
                        style="font-size: 0.8rem; padding: 4px 8px; margin:0;">ログアウト</button>
                </form>
            </li>
            {% else %}
            <li><a href="{% url 'login' %}" class="secondary">ログイン</a></li>
            {% endif %}

            <li>
                <a href="{% url 'shop:checkout' %}" class="secondary" id="cart-link">
                    🛒 カート <span id="cart-count" class="badge">{{ cart_count|default:0 }}</span>
                </a>
            </li>
            <li>
                <a href="{% url 'shop:empty_cart' %}" class="outline secondary"
                    style="font-size: 0.8rem; border-color: transparent;">🗑️</a>
            </li>
        </ul>
    </nav>

    <main class="container">
        <div id="messages-container">
            {% include "shop/partials/messages.html" %}
        </div>

        {% block content %}{% endblock %}
    </main>
</body>

</html>

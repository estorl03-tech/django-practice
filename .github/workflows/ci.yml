name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-assurance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14.3

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint (Ruff)
        run: uv run ruff check .

      - name: Type Check (mypy)
        run: uv run mypy .

      - name: Test (pytest)
        run: uv run pytest
services:
  - type: web
    name: django-ec-portfolio
    env: python
    plan: free
    region: singapore
    # ビルド時に静的ファイル収集とDBマイグレーションを完了させる
    buildCommand: "uv sync --frozen && uv run python manage.py collectstatic --no-input && uv run python manage.py migrate"
    # 起動コマンド（gunicornを使用）
    startCommand: "uv run gunicorn myproject.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: DJANGO_SETTINGS_MODULE
        value: myproject.settings.prod  # 画像の「prod.py」に合わせました
      - key: PYTHONPATH
        value: "."
      - key: UV_SYSTEM_PYTHON
        value: "1"
      - key: RENDER
        value: "True"
      - key: ALLOWED_HOSTS
        value: "*.onrender.com"
services:
  - type: web
    name: django-ec-portfolio
    env: python
    plan: free
    region: singapore
    # 【最重要】ビルド時はインストール「だけ」にする。ここで python を動かさない。
    buildCommand: "pip install uv && uv pip install -r requirements.txt --system"
    # 【最重要】ビルドが終わってパスが通った「起動時」に、すべての Django 命令を実行する
    startCommand: "python manage.py migrate && python manage.py collectstatic --no-input && gunicorn shop.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: DJANGO_SETTINGS_MODULE
        value: shop.settings
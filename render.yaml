services:
  - type: web
    name: django-ec-portfolio
    env: python
    plan: free
    region: singapore
    # 修正ポイント: python manage.py を明示し、migrateもビルド時に終わらせる
    buildCommand: "uv sync --frozen && uv run python manage.py collectstatic --no-input && uv run python manage.py migrate"
    # 修正ポイント: 起動コマンドはアプリの立ち上げだけに集中させる
    startCommand: "uv run gunicorn myproject.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: DJANGO_SETTINGS_MODULE
        value: myproject.settings
      - key: PYTHONPATH
        value: "."
      - key: UV_SYSTEM_PYTHON
        value: "1"
      - key: RENDER
        value: "True"
      - key: ALLOWED_HOSTS
        value: "*.onrender.com"
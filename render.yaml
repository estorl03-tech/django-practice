services:
  - type: web
    name: django-ec-portfolio
    env: python
    plan: free
    region: singapore
    # 品質保証：uv.lock を使った自律型ビルド
    buildCommand: "curl -LsSf https://astral.sh/uv/install.sh | sh && source $HOME/.cargo/env && uv sync && uv run python manage.py collectstatic --no-input"
    # 運用：myproject.wsgi を呼び出すように修正
    startCommand: "source $HOME/.cargo/env && uv run python manage.py migrate && uv run gunicorn myproject.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: DJANGO_SETTINGS_MODULE
        value: myproject.settings  # shop.settings から修正
      - key: PYTHONPATH
        value: "."
      - key: UV_SYSTEM_PYTHON
        value: "1"
services:
  - type: web
    name: django-ec-portfolio
    env: python
    plan: free
    region: singapore
    # uv sync で uv.lock の内容を完全に再現し、--system でパスを通す
    buildCommand: "pip install uv && uv sync --system && python manage.py collectstatic --no-input"
    # 起動時に DB 同期とサーバー起動を行う
    startCommand: "python manage.py migrate && gunicorn shop.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: DJANGO_SETTINGS_MODULE
        value: shop.settings
services:
  - type: web
    name: django-ec-portfolio
    env: python
    plan: free
    region: singapore
    buildCommand: "pip install uv && uv pip install -r requirements.txt --system && python manage.py collectstatic --no-input"
    # ここを修正：uv run を頭につけることで、パスを強制的に通します
    startCommand: "uv run python manage.py migrate && uv run gunicorn shop.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: DJANGO_SETTINGS_MODULE
        value: shop.settings
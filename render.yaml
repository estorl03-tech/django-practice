services:
  - type: web
    name: django-ec-portfolio
    env: python
    plan: free  # 👈 ここが重要！「無料で動かせ」と強制します
    region: singapore # 日本から近いリージョン
    buildCommand: "pip install uv && uv pip install -r requirements.txt --system && python manage.py collectstatic --no-input && python manage.py migrate"
    startCommand: "gunicorn myproject.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: DJANGO_SETTINGS_MODULE
        value: myproject.settings
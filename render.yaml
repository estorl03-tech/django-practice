services:
  - type: web
    name: django-ec-portfolio
    env: python
    plan: free
    region: singapore
    buildCommand: "uv sync && uv run python manage.py collectstatic --no-input"
    startCommand: "uv run python manage.py migrate && uv run gunicorn myproject.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.14.3
      - key: DJANGO_SETTINGS_MODULE
        value: myproject.settings
      - key: PYTHONPATH
        value: "."
      - key: UV_SYSTEM_PYTHON
        value: "1"
